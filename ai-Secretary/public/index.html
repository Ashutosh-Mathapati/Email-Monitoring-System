<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Executive Command Center</title>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">EXECUTIVE AGENT</h1>
                <p class="text-slate-500 font-medium">AI-Powered Inbox Management</p>
            </div>
            <button onclick="loadDashboard()" class="bg-white border border-slate-200 shadow-sm px-6 py-2 rounded-full font-bold text-slate-600 hover:bg-slate-100 transition">
                ↻ Refresh Dashboard
            </button>
        </header>

        <div id="dashboard-container" class="space-y-8">
            <!-- Cards will load here -->
            <div class="text-center py-20 text-slate-400 font-medium bg-white rounded-3xl border-2 border-dashed border-slate-200">
                Waiting for AI analysis... (Send an email to see tasks)
            </div>
        </div>
    </div>

    <script>
    async function loadDashboard() {
        try {
            const res = await fetch('/api/dashboard');
            const cards = await res.json();
            const container = document.getElementById('dashboard-container');

            if (!Array.isArray(cards) || cards.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-slate-400 font-medium bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        All caught up! Send an email to see new tasks.
                    </div>`;
                return;
            }

            container.innerHTML = cards.map(card => `
                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden mb-8">
                    <div class="p-6 bg-slate-900 text-white">
                        <h3 class="text-xl font-bold">${card.subject}</h3>
                        <p class="text-slate-400 text-sm">From: ${card.sender_email}</p>
                    </div>
                    <div class="p-6 space-y-4">
                        ${card.tasks.map(task => `
                            <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-300 transition">
                                <input type="number" id="order-${task.id}" value="${task.order}" 
                                       onchange="updateTask(${task.id})"
                                       class="w-12 h-10 text-center bg-white border-2 border-blue-200 rounded-xl font-bold text-blue-600 outline-none">
                                <div class="flex-grow font-semibold text-slate-700">${task.action_item}</div>
                                <select id="priority-${task.id}" onchange="updateTask(${task.id})" 
                                        class="text-xs font-bold p-2 rounded-lg bg-slate-200 border-none">
                                    <option value="High" ${task.priority === 'High' ? 'selected' : ''}>High</option>
                                    <option value="Medium" ${task.priority === 'Medium' ? 'selected' : ''}>Medium</option>
                                    <option value="Low" ${task.priority === 'Low' ? 'selected' : ''}>Low</option>
                                </select>
                                <button onclick="approveTask(${task.id}, this)" 
                                        class="px-6 py-2 rounded-xl font-bold text-sm transition ${task.status === 'Scheduled' ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-600 text-white shadow-lg'}">
                                    ${task.status === 'Scheduled' ? 'Approved ✅' : 'Schedule'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error("Dashboard failed to load:", err);
        }
    }

    // New Function to save Owner's Manual Changes
    async function updateTask(id) {
    // READ THE LIVE VALUES from the inputs using their IDs
    const newOrder = document.getElementById(`order-${id}`).value;
    const newPriority = document.getElementById(`priority-${id}`).value;

    console.log(`Updating Task ${id}: Order ${newOrder}, Priority ${newPriority}`);
    
    try {
        await fetch('/api/tasks/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                id: id, 
                task_order: parseInt(newOrder), 
                priority: newPriority 
            })
        });
        
        // Reload to re-sort visually based on new numbers
        loadDashboard(); 
    } catch (err) {
        console.error("Update failed", err);
    }
}
   async function approveTask(id, btn) {
    btn.innerText = "Booking...";
    btn.disabled = true; // Prevent double clicking

    try {
        const res = await fetch('/api/tasks/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });

        if (res.ok) {
            btn.innerText = "Approved ✅";
            btn.className = "px-6 py-2 rounded-xl font-bold text-sm bg-slate-200 text-slate-400 cursor-not-allowed";
            // Refresh to update the DB states in the UI
            setTimeout(loadDashboard, 1000); 
        } else {
            const errData = await res.json();
            alert("Error: " + (errData.error || "Scheduling failed"));
            btn.innerText = "Schedule";
            btn.disabled = false;
        }
    } catch (err) {
        alert("Server connection lost.");
        btn.innerText = "Schedule";
        btn.disabled = false;
    }
}

    loadDashboard();
</script>
</body>
</html>
