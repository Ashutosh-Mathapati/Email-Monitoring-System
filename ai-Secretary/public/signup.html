<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Executive Setup</title>
    <style>
        body { background: #1a0b0b; background-image: radial-gradient(#3d1515 1px, transparent 1px); background-size: 30px 30px; }
        .glass { background: rgba(30, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-btn { background: linear-gradient(90deg, #ff4d2a, #ff6b4a); box-shadow: 0 0 20px rgba(255, 77, 42, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-10 rounded-[32px] shadow-2xl w-full max-w-md text-center">
        <div class="bg-white/5 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-white/10 shadow-lg">
            <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Executive Setup</h1>
        <p class="text-slate-400 text-sm mb-8">Connect your inbox • Let AI handle the rest</p>
        
        <form action="/api/signup" method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Executive Email</label>
                <input type="email" name="email" required placeholder="name@outlook.com" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-orange-500 transition">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Track Emails From</label>
                <input type="datetime-local" name="startDate" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-orange-500 transition color-scheme-dark">
            </div>
            <button type="submit" class="w-full glow-btn text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:scale-[1.02] transition active:scale-95">
                Start Tracking & Login <span>→</span>
            </button>
        </form>
    </div>
</body>
</html>
